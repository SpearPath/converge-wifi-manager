name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: converge-wifi-manager-linux
          - os: windows-latest
            artifact: converge-wifi-manager-windows

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev cmake

    - name: Configure
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure -C Release

    - name: Package (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p dist
        cp build/converge-wifi-manager dist/
        cp README.md LICENSE dist/
        tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        New-Item -ItemType Directory -Force dist
        Copy-Item build/Release/converge-wifi-manager.exe dist/
        Copy-Item README.md, LICENSE dist/
        Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          converge-wifi-manager-linux/*.tar.gz
          converge-wifi-manager-windows/*.zip
