name: CI Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev cmake clang-tidy

    - name: Configure CMake (Ubuntu — with clang-tidy)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B build -DENABLE_CLANG_TIDY=ON

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure -C Release

  sanitizer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev cmake

    - name: Configure with sanitizers
      run: cmake -S . -B build -DENABLE_SANITIZERS=ON

    - name: Build
      run: cmake --build build

    - name: Test under ASan/UBSan
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure
