name: CI Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev cmake clang-tidy

    - name: Configure CMake (Ubuntu — with clang-tidy)
      if: matrix.os == 'ubuntu-latest'
      run: cmake -S . -B build -DENABLE_CLANG_TIDY=ON

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure -C Release

  sanitizer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev cmake

    - name: Configure with sanitizers
      run: cmake -S . -B build -DENABLE_SANITIZERS=ON

    - name: Build
      run: cmake --build build

    - name: Test under ASan/UBSan
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev cmake lcov

    - name: Configure with coverage
      run: cmake -S . -B build -DENABLE_COVERAGE=ON

    - name: Build
      run: cmake --build build

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure

    - name: Collect coverage
      run: |
        lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
        lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Generate HTML report
      run: genhtml coverage.info --output-directory coverage-report

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/
